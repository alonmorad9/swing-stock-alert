name = "swing-stock-alert-scheduler"
main = "worker.js"
compatibility_date = "2026-05-04"

[triggers]
crons = [
  # Weekly pilot scan: Friday 21:30 UTC, after regular US market close.
  "30 21 * * 5",

  # Month-end comparison: runs near month end. The script labels this as monthly.
  "30 21 28-31 * *",
]
